name: Deploy static HTML to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 1. Add Concurrency Control to prevent deployment queue clashes
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # 2. Map the deployment output URL directly to your GitHub UI
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."  # Root directory where your HTML/JS files live

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
