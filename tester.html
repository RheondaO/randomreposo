<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Markdown Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
</head>
<body>

    <h2>Live Project Updates</h2>
    <div id="content">Loading content...</div>

    <script>
        const mdUrl = 'https://raw.githubusercontent.com/RheondaO/randomreposo/refs/heads/main/prompts/lead_scoring_logic_v1.md';

        async function loadMarkdown() {
            try {
                const response = await fetch(mdUrl);
                const text = await response.text();
                // Convert Markdown to HTML and inject it
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (error) {
                console.error('Error fetching markdown:', error);
                document.getElementById('content').innerHTML = 'Failed to load content.';
            }
        }

        loadMarkdown();
    </script>
</body>
</html>
